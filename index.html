function computePayout(bet) {
  const key = bet.race_code + '|' + bet.bet_type;
  const raceResults = results[key];
  if (!raceResults) return { confirmed_kaime: '-', payout: null, status: 'pending' };
  const hit = raceResults.find(r => r.kaime === bet.kaime);
  if (hit) {
    const payout = Math.floor((bet.amount / 100) * hit.return_);
    return { confirmed_kaime: raceResults.map(r=>r.kaime).join('/'), payout, status: 'hit' };
  }
  return { confirmed_kaime: raceResults.map(r=>r.kaime).join('/'), payout: 0, status: 'miss' };
}

function render() {
  let cumPL = 0;
  let cumByType = { '3t': 0, '3f': 0, '2t': 0, '2f': 0 };

    const res = computePayout(bet);
    let net = null;
    if (res.status !== 'pending') {
      net = (res.payout || 0) - bet.amount;
      cumPL += net;
      cumByType[bet.bet_type] = (cumByType[bet.bet_type] || 0) + net;
    } else {
      cumPL -= bet.amount;
      cumByType[bet.bet_type] = (cumByType[bet.bet_type] || 0) - bet.amount;
    }
    return { ...bet, ...res, net, cumPL, cumByType: {...cumByType} };
